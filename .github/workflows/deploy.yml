name: Build and Deploy to BigRock

on:
  push:
    branches:
      - main # Or 'master', depending on your default branch name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20' # Uses a stable Node version

    - name: Install Dependencies & Build
      working-directory: ./frontend
      run: |
        npm install --legacy-peer-deps
        npm run build
      
    - name: Deploy to BigRock via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./frontend/build/ # The folder generated by the build
        server-dir: / # Deploys directly into the directory you set in BigRock

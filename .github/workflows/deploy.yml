name: Build and Deploy to BigRock

on:
  push:
    branches:
      - main # Change to 'master' if that is your default branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20' 

    - name: Install Dependencies & Build
      working-directory: ./frontend
      run: |
        npm install dotenv ajv@latest ajv-keywords@latest @craco/craco@latest react-scripts@latest --legacy-peer-deps
        CI=false npm run build
      
    - name: Deploy to BigRock via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./frontend/build/ 
        server-dir: /
